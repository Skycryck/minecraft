<style>
/* ── Reset & Variables ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0c0c0f;--bg-card:#16161a;--bg-card-alt:#1c1c22;--bg-hover:#222230;
  --border:#2a2a35;--border-light:#3a3a48;
  --text:#e8e6e3;--text-dim:#8b8b96;--text-muted:#5c5c68;
  --accent:#7c6aef;--accent-light:#9b8df7;--accent-dim:#5a4bb8;
  --green:#3ecf8e;--green-dim:#2a9d68;
  --red:#ef6a6a;--orange:#efaa6a;--blue:#6aafef;--cyan:#6aefd9;
  --yellow:#efd96a;--pink:#ef6ac0;--teal:#6aefe0;
  --font-mono:'JetBrains Mono',monospace;
  --font-sans:'Space Grotesk',system-ui,sans-serif;
  --radius:10px;--radius-sm:6px;
}
html{font-size:15px;scroll-behavior:smooth}
body{
  background:var(--bg);color:var(--text);font-family:var(--font-sans);
  min-height:100vh;line-height:1.5;
  background-image:
    radial-gradient(ellipse 80% 50% at 50% -20%,rgba(124,106,239,.08),transparent),
    radial-gradient(ellipse 60% 40% at 80% 100%,rgba(62,207,142,.04),transparent);
}
a{color:var(--accent-light);text-decoration:none}

/* ── Scrollbar ── */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* ── Layout ── */
.app{max-width:1400px;margin:0 auto;padding:1rem}

/* ── Header ── */
.header{
  text-align:center;padding:2.5rem 1rem 2rem;position:relative;
}
.header h1{
  font-size:2.6rem;font-weight:700;letter-spacing:-.03em;
  background:linear-gradient(135deg,var(--accent-light),var(--green),var(--cyan));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;margin-bottom:.3rem;
}
.header p{color:var(--text-dim);font-size:.95rem;font-family:var(--font-mono)}
.header .meta{
  display:flex;gap:1.5rem;justify-content:center;margin-top:1rem;flex-wrap:wrap;
}
.header .meta span{
  font-family:var(--font-mono);font-size:.8rem;color:var(--text-muted);
  background:var(--bg-card);padding:.35rem .8rem;border-radius:20px;
  border:1px solid var(--border);
}
.header .meta span b{color:var(--accent-light);font-weight:600}

/* ── Navigation ── */
.nav{
  display:flex;gap:.5rem;justify-content:center;flex-wrap:wrap;
  padding:1rem 0;position:sticky;top:0;z-index:100;
  background:rgba(12,12,15,.85);backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);margin-bottom:1.5rem;
}
.nav button{
  font-family:var(--font-mono);font-size:.78rem;
  padding:.5rem 1rem;border-radius:20px;border:1px solid var(--border);
  background:var(--bg-card);color:var(--text-dim);cursor:pointer;
  transition:all .2s;white-space:nowrap;
}
.nav button:hover{border-color:var(--accent);color:var(--text)}
.nav button.active{
  background:var(--accent);border-color:var(--accent);color:#fff;
  box-shadow:0 0 20px rgba(124,106,239,.25);
}

/* ── Cards ── */
.card{
  background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);
  padding:1.25rem;margin-bottom:1rem;
  transition:border-color .2s;
}
.card:hover{border-color:var(--border-light)}
.card h3{
  font-size:.85rem;text-transform:uppercase;letter-spacing:.08em;
  color:var(--text-muted);margin-bottom:1rem;font-family:var(--font-mono);
  display:flex;align-items:center;gap:.5rem;
}
.card h3 .icon{font-size:1.1rem}

/* ── Grid ── */
.grid{display:grid;gap:1rem}
.grid-2{grid-template-columns:repeat(auto-fit,minmax(340px,1fr))}
.grid-3{grid-template-columns:repeat(auto-fit,minmax(280px,1fr))}
.grid-4{grid-template-columns:repeat(auto-fit,minmax(200px,1fr))}

/* ── Stat Tiles ── */
.stat-tile{
  background:var(--bg-card-alt);border-radius:var(--radius-sm);
  padding:1rem;text-align:center;border:1px solid var(--border);
  transition:transform .15s,border-color .15s;
}
.stat-tile:hover{transform:translateY(-2px);border-color:var(--accent-dim)}
.stat-tile .value{
  font-size:1.8rem;font-weight:700;font-family:var(--font-mono);
  line-height:1.1;margin-bottom:.2rem;
}
.stat-tile .label{font-size:.72rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;font-family:var(--font-mono)}
.stat-tile .sub{font-size:.7rem;color:var(--text-dim);margin-top:.15rem;font-family:var(--font-mono)}

/* ── Leaderboard ── */
.leaderboard{list-style:none}
.leaderboard li{
  display:flex;align-items:center;gap:.75rem;
  padding:.6rem .8rem;border-radius:var(--radius-sm);
  transition:background .15s;font-family:var(--font-mono);font-size:.82rem;
}
.leaderboard li:hover{background:var(--bg-hover)}
.leaderboard .rank{
  width:1.6rem;height:1.6rem;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:.7rem;font-weight:700;flex-shrink:0;
  border:1px solid var(--border);color:var(--text-muted);
}
.leaderboard li:nth-child(1) .rank{background:linear-gradient(135deg,#ffd700,#b8860b);color:#000;border:none}
.leaderboard li:nth-child(2) .rank{background:linear-gradient(135deg,#c0c0c0,#808080);color:#000;border:none}
.leaderboard li:nth-child(3) .rank{background:linear-gradient(135deg,#cd7f32,#8b4513);color:#fff;border:none}
.leaderboard .name{flex:1;color:var(--text)}
.leaderboard .val{color:var(--accent-light);font-weight:600}
.leaderboard .bar-bg{
  flex:1;height:6px;background:var(--bg);border-radius:3px;overflow:hidden;min-width:60px;
}
.leaderboard .bar-fill{height:100%;border-radius:3px;transition:width .6s ease}

/* ── Chart Container ── */
.chart-wrap{position:relative;width:100%;max-height:350px}
.chart-wrap canvas{width:100%!important}

/* ── Player Profile Header ── */
.profile-header{
  display:flex;align-items:center;gap:1.5rem;padding:1.5rem;
  background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);
  margin-bottom:1.5rem;flex-wrap:wrap;
}
.profile-avatar{
  width:64px;height:64px;border-radius:var(--radius-sm);
  image-rendering:pixelated;border:2px solid var(--accent-dim);
  background:var(--bg);
}
.profile-info h2{font-size:1.8rem;font-weight:700;letter-spacing:-.02em}
.profile-info .uuid{font-family:var(--font-mono);font-size:.7rem;color:var(--text-muted)}
.profile-stats{
  display:flex;gap:1.5rem;margin-left:auto;flex-wrap:wrap;
}
.profile-stat{text-align:center}
.profile-stat .pv{font-size:1.4rem;font-weight:700;font-family:var(--font-mono);color:var(--accent-light)}
.profile-stat .pl{font-size:.65rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;font-family:var(--font-mono)}

/* ── Sections ── */
.section{display:none}
.section.active{display:block}

/* ── Table ── */
.stat-table{width:100%;border-collapse:collapse;font-family:var(--font-mono);font-size:.78rem}
.stat-table th{
  text-align:left;padding:.5rem .6rem;color:var(--text-muted);font-weight:600;
  border-bottom:1px solid var(--border);text-transform:uppercase;font-size:.65rem;
  letter-spacing:.06em;cursor:pointer;user-select:none;
}
.stat-table th:hover{color:var(--accent-light)}
.stat-table td{padding:.45rem .6rem;border-bottom:1px solid rgba(42,42,53,.5)}
.stat-table tr:hover td{background:var(--bg-hover)}
.stat-table .num{text-align:right;font-weight:600;color:var(--accent-light)}
.record-badge{
  display:inline-block;padding:.1rem .4rem;border-radius:10px;font-size:.6rem;
  font-weight:700;margin-left:.3rem;
  background:linear-gradient(135deg,#ffd700,#b8860b);color:#000;
}

/* ── Tab-pills inside cards ── */
.pill-tabs{display:flex;gap:.3rem;margin-bottom:1rem;flex-wrap:wrap}
.pill-tabs button{
  font-family:var(--font-mono);font-size:.68rem;padding:.3rem .7rem;
  border-radius:14px;border:1px solid var(--border);background:transparent;
  color:var(--text-muted);cursor:pointer;transition:all .15s;
}
.pill-tabs button.active{background:var(--accent-dim);color:#fff;border-color:var(--accent-dim)}
.pill-tabs button:hover{border-color:var(--accent);color:var(--text)}

/* ── Responsive ── */
@media(max-width:768px){
  .header h1{font-size:1.6rem}
  .grid-2,.grid-3,.grid-4{grid-template-columns:1fr}
  .profile-header{flex-direction:column;align-items:flex-start}
  .profile-stats{margin-left:0}
  .stat-tile .value{font-size:1.3rem}
  .app{padding:.5rem}
}

/* ── Animations ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.card{animation:fadeUp .4s ease both}
.card:nth-child(2){animation-delay:.05s}
.card:nth-child(3){animation-delay:.1s}
.card:nth-child(4){animation-delay:.15s}

/* ── Color dots for players ── */
.player-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px}
</style>
</head>

function label(key) {
  return LABELS[key] || key.replace(/_/g,' ').replace(/\b\w/g,c=>c.toUpperCase());
}
function fmt(n) {
  if (n >= 1e6) return (n/1e6).toFixed(1)+'M';
  if (n >= 1e3) return (n/1e3).toFixed(1)+'k';
  return n.toLocaleString('fr-FR');
}
function pct(v,max) { return max ? Math.round(v/max*100) : 0; }

const navEl = document.getElementById('nav');

function buildNav() {
  let html = `<button class="active" data-section="overview">📊 Vue globale</button>`;
  html += `<button data-section="leaderboards">🏆 Classements</button>`;
  playerNames.forEach(name => {
    const dot = `<span class="player-dot" style="background:${PLAYER_COLORS_MAP[name]}"></span>`;
    html += `<button data-section="player-${name}">${dot}${name}</button>`;
  });
  navEl.innerHTML = html;
  navEl.querySelectorAll('button').forEach(btn => {
    btn.addEventListener('click', () => {
      navEl.querySelectorAll('button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      showSection(btn.dataset.section);
    });
  });
}

function showSection(id) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  const el = document.getElementById(id);
  if (el) { el.classList.add('active'); }
  // Render charts lazily
  if (id === 'overview') renderOverviewCharts();
  if (id === 'leaderboards') renderLeaderboardCharts();
  if (id.startsWith('player-')) renderPlayerCharts(id.replace('player-',''));
}

// ── Leaderboards ──
function buildLeaderboards() {
  const boards = [
    {key:'play_hours',title:'⏱ Temps de jeu',suffix:'h',color:'var(--accent-light)'},
    {key:'total_mined',title:'⛏ Blocs minés',suffix:'',color:'var(--green)'},
    {key:'mob_kills',title:'⚔ Mobs tués',suffix:'',color:'var(--red)'},
    {key:'deaths',title:'💀 Morts',suffix:'',color:'var(--orange)'},
    {key:'total_distance_km',title:'🗺 Distance parcourue',suffix:' km',color:'var(--blue)'},
    {key:'total_crafted',title:'🔨 Items craftés',suffix:'',color:'var(--cyan)'},
    {key:'player_kills',title:'🗡 Joueurs tués',suffix:'',color:'var(--pink)'},
    {key:'enchant_item',title:'✨ Enchantements',suffix:'',color:'var(--yellow)'},
    {key:'fish_caught',title:'🐟 Poissons pêchés',suffix:'',color:'var(--teal)'},
    {key:'traded_with_villager',title:'🤝 Échanges villageois',suffix:'',color:'var(--accent-light)'},
    {key:'animals_bred',title:'💕 Animaux élevés',suffix:'',color:'var(--pink)'},
    {key:'jumps',title:'🦘 Sauts',suffix:'',color:'var(--green)'},
  ];

  let html = `<div class="section" id="leaderboards"><div class="grid grid-3">`;
  boards.forEach(b => {
    const sorted = [...playerNames].sort((a,c) => (PLAYERS_DATA[c][b.key]||0) - (PLAYERS_DATA[a][b.key]||0));
    const maxVal = PLAYERS_DATA[sorted[0]][b.key] || 1;
    html += `<div class="card"><h3>${b.title}</h3><ol class="leaderboard">`;
    sorted.forEach((name,i) => {
      const val = PLAYERS_DATA[name][b.key] || 0;
      const w = pct(val,maxVal);
      const isRecord = i===0 && val > 0;
      html += `<li>
        <span class="rank">${i+1}</span>
        <span class="name"><span class="player-dot" style="background:${PLAYER_COLORS_MAP[name]}"></span>${name}${isRecord?'<span class="record-badge">RECORD</span>':''}</span>
        <span class="bar-bg"><span class="bar-fill" style="width:${w}%;background:${b.color}"></span></span>
        <span class="val">${typeof val==='number'&&val%1?val.toFixed(1):fmt(val)}${b.suffix}</span>
      </li>`;
    });
    html += `</ol></div>`;
  });
  html += `</div>
    <div class="grid grid-2" style="margin-top:1rem">
      <div class="card">
        <h3><span class="icon">💀</span> Causes de mort (tous joueurs)</h3>
        <div class="chart-wrap"><canvas id="chart-deathcauses"></canvas></div>
      </div>
      <div class="card">
        <h3><span class="icon">🚶</span> Répartition des distances</h3>
        <div class="chart-wrap"><canvas id="chart-dist-stacked"></canvas></div>
      </div>
    </div>
  </div>`;
  return html;
}

function renderLeaderboardCharts() {
  // Death causes aggregation
  destroyChart('chart-deathcauses');
  const deathAgg = {};
  playerNames.forEach(n => {
    const kb = PLAYERS_DATA[n].killed_by || {};
    Object.entries(kb).forEach(([mob,count]) => {
      deathAgg[mob] = (deathAgg[mob]||0) + count;
    });
  });
  const deathSorted = Object.entries(deathAgg).sort((a,b)=>b[1]-a[1]);
  const deathColors = ['#ef6a6a','#efaa6a','#efd96a','#3ecf8e','#6aafef','#7c6aef','#ef6ac0','#6aefd9','#a86aef','#8b8b96'];
  charts['chart-deathcauses'] = new Chart(document.getElementById('chart-deathcauses'), {
    type:'doughnut', data:{
      labels: deathSorted.map(d=>label(d[0])),
      datasets:[{data:deathSorted.map(d=>d[1]),
        backgroundColor:deathSorted.map((_,i)=>deathColors[i%deathColors.length]+'cc'),
        borderColor:'#16161a',borderWidth:2}]
    }, options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{position:'right',labels:{font:{size:10}}}}}
  });

  // Stacked distance bar
  destroyChart('chart-dist-stacked');
  const distTypes = ['walk','sprint','fly','aviate','swim','boat','horse','climb','crouch','fall'];
  const distColors = ['#7c6aef','#3ecf8e','#6aafef','#efd96a','#6aefd9','#efaa6a','#ef6ac0','#a86aef','#8b8b96','#ef6a6a'];
  charts['chart-dist-stacked'] = new Chart(document.getElementById('chart-dist-stacked'), {
    type:'bar', data:{
      labels: playerNames.filter(n=>PLAYERS_DATA[n].total_distance_km>20),
      datasets: distTypes.map((dt,i) => ({
        label: label(dt),
        data: playerNames.filter(n=>PLAYERS_DATA[n].total_distance_km>20).map(n => PLAYERS_DATA[n].distances?.[dt]||0),
        backgroundColor: distColors[i]+'aa',
        borderWidth:0
      }))
    }, options:{responsive:true,maintainAspectRatio:false,
      scales:{x:{stacked:true,grid:{display:false}},y:{stacked:true,title:{display:true,text:'km'},grid:{color:'rgba(42,42,53,0.3)'}}},
      plugins:{legend:{position:'bottom',labels:{font:{size:9}}}}}
  });
}

// ── Player Section ──
function buildPlayerSection(name) {
  const p = PLAYERS_DATA[name];
  const color = PLAYER_COLORS_MAP[name];
  const avatarUrl = `https://crafatar.com/avatars/${p.uuid}?size=64&overlay`;

  // Find records
  const records = [];
  ['play_hours','total_mined','mob_kills','total_distance_km','total_crafted','player_kills','enchant_item','fish_caught','traded_with_villager','animals_bred','jumps'].forEach(key => {
    const max = Math.max(...playerNames.map(n=>PLAYERS_DATA[n][key]||0));
    if ((p[key]||0) === max && max > 0) records.push(key);
  });

  let recordBadges = records.length ? `<div style="margin-top:.5rem;display:flex;gap:.3rem;flex-wrap:wrap">${records.map(r=>`<span class="record-badge">${label(r).substring(0,20)}</span>`).join('')}</div>` : '';

  // Killed by table
  const killedBy = Object.entries(p.killed_by || {}).sort((a,b)=>b[1]-a[1]);
  let killedByHtml = killedBy.length ? killedBy.map(([mob,c])=>`<li><span style="color:var(--text)">${label(mob)}</span> <span style="color:var(--red);font-weight:600">${c}×</span></li>`).join('') : '<li style="color:var(--text-muted)">Aucune mort enregistrée</li>';

  // Top mined table
  const minedEntries = Object.entries(p.mined_top15 || {});
  let minedHtml = '';
  if (minedEntries.length) {
    const maxM = minedEntries[0]?.[1] || 1;
    minedHtml = minedEntries.map(([block,count]) => {
      const w = pct(count,maxM);
      return `<li>
        <span class="name">${label(block)}</span>
        <span class="bar-bg"><span class="bar-fill" style="width:${w}%;background:${color}"></span></span>
        <span class="val">${fmt(count)}</span>
      </li>`;
    }).join('');
  }

  // Top killed table
  const killedEntries = Object.entries(p.killed_top10 || {});
  let killedHtml = '';
  if (killedEntries.length) {
    const maxK = killedEntries[0]?.[1] || 1;
    killedHtml = killedEntries.map(([mob,count]) => {
      const w = pct(count,maxK);
      return `<li>
        <span class="name">${label(mob)}</span>
        <span class="bar-bg"><span class="bar-fill" style="width:${w}%;background:var(--red)"></span></span>
        <span class="val">${fmt(count)}</span>
      </li>`;
    }).join('');
  }

  // Top crafted table
  const craftedEntries = Object.entries(p.crafted_top15 || {});
  let craftedHtml = '';
  if (craftedEntries.length) {
    const maxC = craftedEntries[0]?.[1] || 1;
    craftedHtml = craftedEntries.slice(0,10).map(([item,count]) => {
      const w = pct(count,maxC);
      return `<li>
        <span class="name">${label(item)}</span>
        <span class="bar-bg"><span class="bar-fill" style="width:${w}%;background:var(--cyan)"></span></span>
        <span class="val">${fmt(count)}</span>
      </li>`;
    }).join('');
  }

  const kd = p.deaths > 0 ? (p.mob_kills / p.deaths).toFixed(1) : '∞';
  const minedPerHour = p.play_hours > 0 ? Math.round(p.total_mined / p.play_hours) : 0;
  const killsPerHour = p.play_hours > 0 ? Math.round(p.mob_kills / p.play_hours) : 0;

  return `
  <div class="section" id="player-${name}">
    <div class="profile-header" style="border-left:4px solid ${color}">
      <img class="profile-avatar" src="${avatarUrl}" alt="${name}" onerror="this.style.display='none'">
      <div class="profile-info">
        <h2 style="color:${color}">${name}</h2>
        <div class="uuid">${p.uuid}</div>
        ${recordBadges}
      </div>
      <div class="profile-stats">
        <div class="profile-stat"><div class="pv">${p.play_hours}h</div><div class="pl">Temps de jeu</div></div>
        <div class="profile-stat"><div class="pv" style="color:var(--red)">${kd}</div><div class="pl">K/D ratio</div></div>
        <div class="profile-stat"><div class="pv" style="color:var(--green)">${fmt(p.total_distance_km)} km</div><div class="pl">Parcourus</div></div>
      </div>
    </div>

    <div class="grid grid-4" style="margin-bottom:1rem">
      <div class="stat-tile"><div class="value" style="color:var(--green)">${fmt(p.total_mined)}</div><div class="label">Blocs minés</div><div class="sub">${fmt(minedPerHour)}/h</div></div>
      <div class="stat-tile"><div class="value" style="color:var(--red)">${fmt(p.mob_kills)}</div><div class="label">Mobs tués</div><div class="sub">${fmt(killsPerHour)}/h</div></div>
      <div class="stat-tile"><div class="value" style="color:var(--orange)">${p.deaths}</div><div class="label">Morts</div></div>
      <div class="stat-tile"><div class="value" style="color:var(--cyan)">${fmt(p.total_crafted)}</div><div class="label">Items craftés</div></div>
    </div>

    <div class="grid grid-4" style="margin-bottom:1rem">
      <div class="stat-tile"><div class="value" style="color:var(--yellow)">${fmt(p.enchant_item)}</div><div class="label">Enchantements</div></div>
      <div class="stat-tile"><div class="value" style="color:var(--blue)">${fmt(p.open_chest)}</div><div class="label">Coffres ouverts</div></div>
      <div class="stat-tile"><div class="value" style="color:var(--teal)">${fmt(p.fish_caught)}</div><div class="label">Poissons pêchés</div></div>
      <div class="stat-tile"><div class="value" style="color:var(--pink)">${fmt(p.traded_with_villager)}</div><div class="label">Échanges PNJ</div></div>
    </div>

    <div class="grid grid-2">
      <div class="card">
        <h3><span class="icon">🚶</span> Distances parcourues</h3>
        <div class="chart-wrap"><canvas id="chart-dist-${name}"></canvas></div>
      </div>
      <div class="card">
        <h3><span class="icon">💀</span> Tué par</h3>
        <ul class="leaderboard" style="font-size:.8rem">${killedByHtml}</ul>
      </div>
    </div>

    <div class="grid grid-2">
      <div class="card">
        <h3><span class="icon">⛏</span> Top 15 blocs minés</h3>
        <ol class="leaderboard">${minedHtml || '<li style="color:var(--text-muted)">Aucun bloc miné</li>'}</ol>
      </div>
      <div class="card">
        <h3><span class="icon">⚔</span> Top 10 mobs tués</h3>
        <ol class="leaderboard">${killedHtml || '<li style="color:var(--text-muted)">Aucun mob tué</li>'}</ol>
      </div>
    </div>

    <div class="card">
      <h3><span class="icon">🔨</span> Top 10 items craftés</h3>
      <ol class="leaderboard">${craftedHtml || '<li style="color:var(--text-muted)">Rien de crafté</li>'}</ol>
    </div>
  </div>`;
}

function renderPlayerCharts(name) {
  const p = PLAYERS_DATA[name];
  const color = PLAYER_COLORS_MAP[name];

  // Distance polar
  const distId = `chart-dist-${name}`;
  destroyChart(distId);
  const dists = p.distances || {};
  const distEntries = Object.entries(dists).filter(([_,v])=>v>0).sort((a,b)=>b[1]-a[1]);
  if (distEntries.length && document.getElementById(distId)) {
    const distPalette = ['#7c6aef','#3ecf8e','#6aafef','#efd96a','#6aefd9','#efaa6a','#ef6ac0','#a86aef','#ef6a6a','#8b8b96','#5c5c68','#3a3a48','#222230'];
    charts[distId] = new Chart(document.getElementById(distId), {
      type:'bar', data:{
        labels: distEntries.map(d=>label(d[0])),
        datasets:[{
          data: distEntries.map(d=>d[1]),
          backgroundColor: distEntries.map((_,i)=>distPalette[i%distPalette.length]+'cc'),
          borderColor: distEntries.map((_,i)=>distPalette[i%distPalette.length]),
          borderWidth:1, borderRadius:4
        }]
      }, options:{responsive:true,maintainAspectRatio:false,indexAxis:'y',
        plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>ctx.parsed.x.toFixed(2)+' km'}}},
        scales:{x:{title:{display:true,text:'km'},grid:{color:'rgba(42,42,53,0.3)'}},y:{grid:{display:false}}}}
    });
  }
}

buildNav();
buildAllSections();
renderOverviewCharts();
